<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nessus Bulk Downloader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c10;
    --bg2: #111318;
    --bg3: #181c24;
    --border: #1e2330;
    --border2: #2a3040;
    --text: #e2e8f0;
    --text2: #8892a4;
    --text3: #525d70;
    --accent: #00d4ff;
    --accent2: #0099bb;
    --green: #00ff88;
    --green2: #00cc6a;
    --red: #ff4466;
    --amber: #ffaa00;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    font-size: 13px;
    line-height: 1.6;
  }

  .topbar {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 15px;
    letter-spacing: -0.02em;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .badge {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text3);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 24px;
    align-items: start;
  }

  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
  }

  .panel-header .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  .panel-body { padding: 20px; }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
    font-family: var(--sans);
    font-weight: 600;
  }

  .field input, .field select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent2);
  }

  .field input::placeholder { color: var(--text3); }

  .field select option { background: var(--bg3); }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .auth-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border2);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .auth-tab {
    flex: 1;
    padding: 8px;
    background: transparent;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    transition: all 0.15s;
    text-align: center;
    letter-spacing: 0.05em;
  }

  .auth-tab.active {
    background: var(--accent);
    color: var(--bg);
    font-weight: 700;
  }

  .format-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .format-btn {
    padding: 10px 6px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text2);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    text-align: center;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .format-btn .fmt-icon { font-size: 16px; }

  .format-btn.selected {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0, 212, 255, 0.06);
  }

  .btn {
    width: 100%;
    padding: 12px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }

  .btn-test {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    margin-bottom: 10px;
  }

  .btn-test:hover { border-color: var(--accent2); color: var(--accent); }

  .btn-start {
    background: var(--accent);
    color: var(--bg);
  }

  .btn-start:hover { background: var(--accent2); }
  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }

  .connection-status {
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 14px;
    display: none;
  }

  .status-ok {
    background: rgba(0, 255, 136, 0.07);
    border: 1px solid rgba(0, 255, 136, 0.25);
    color: var(--green);
  }

  .status-err {
    background: rgba(255, 68, 102, 0.07);
    border: 1px solid rgba(255, 68, 102, 0.25);
    color: var(--red);
  }

  .right-col { display: flex; flex-direction: column; gap: 20px; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    font-family: var(--sans);
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    font-family: var(--sans);
    line-height: 1;
  }

  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.amber { color: var(--amber); }
  .stat-value.cyan { color: var(--accent); }

  .log-container {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    height: 340px;
    overflow-y: auto;
    padding: 16px;
    font-size: 12px;
    line-height: 1.8;
  }

  .log-line { color: var(--text2); }
  .log-line.ok { color: var(--green); }
  .log-line.err { color: var(--red); }
  .log-line.info { color: var(--accent); }
  .log-line.warn { color: var(--amber); }

  .log-empty {
    color: var(--text3);
    text-align: center;
    margin-top: 120px;
    font-family: var(--sans);
    font-size: 13px;
  }

  .scan-list {
    max-height: 280px;
    overflow-y: auto;
  }

  .scan-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .scan-item:hover { background: var(--bg3); }
  .scan-item:last-child { border-bottom: none; }

  .scan-check {
    width: 16px;
    height: 16px;
    border: 1px solid var(--border2);
    border-radius: 3px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    transition: all 0.1s;
  }

  .scan-item.selected .scan-check {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  .scan-info { flex: 1; min-width: 0; }
  .scan-name { color: var(--text); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .scan-meta { color: var(--text3); font-size: 10px; }

  .scan-status {
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: var(--sans);
    font-weight: 600;
  }

  .s-completed { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
  .s-running { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }
  .s-other { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }

  .job-bar {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .job-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 2px;
    transition: width 0.5s;
    width: 0%;
  }

  .job-bar-fill.done { width: 100% !important; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  .select-all-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
  }

  .link-btn {
    background: none;
    border: none;
    color: var(--accent2);
    cursor: pointer;
    font-size: 11px;
    font-family: var(--mono);
  }

  .link-btn:hover { color: var(--accent); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">⬡</div>
    Nessus Bulk Downloader
  </div>
  <div class="badge">v1.0</div>
  <div style="margin-left:auto; color: var(--text3); font-size:11px;">Network VA Automation</div>
</div>

<div class="main">

  <!-- LEFT: Config Panel -->
  <div style="display:flex;flex-direction:column;gap:16px;">

    <div class="panel">
      <div class="panel-header"><div class="dot"></div>Connection</div>
      <div class="panel-body">
        <div class="row">
          <div class="field">
            <label>Host / IP</label>
            <input type="text" id="host" placeholder="192.168.1.100">
          </div>
          <div class="field">
            <label>Port</label>
            <input type="text" id="port" value="8834">
          </div>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchAuth('apikey')">API Keys</button>
          <button class="auth-tab" onclick="switchAuth('password')">Username/Password</button>
        </div>

        <div id="auth-apikey">
          <div class="field">
            <label>Access Key</label>
            <input type="text" id="access_key" placeholder="xxxxxxxxxxxxxxxx">
          </div>
          <div class="field">
            <label>Secret Key</label>
            <input type="password" id="secret_key" placeholder="xxxxxxxxxxxxxxxx">
          </div>
        </div>
        <div id="auth-password" style="display:none">
          <div class="field">
            <label>Username</label>
            <input type="text" id="username" placeholder="admin">
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="">
          </div>
        </div>

        <div id="conn-status" class="connection-status"></div>
        <button class="btn btn-test" onclick="testConnection()">⬡ Test Connection</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><div class="dot"></div>Download Options</div>
      <div class="panel-body">
        <div class="field">
          <label>Export Formats</label>
          <div class="format-grid">
            <div class="format-btn selected" data-fmt="nessus" onclick="toggleFormat(this)">
              <span class="fmt-icon">🗄️</span>.nessus
            </div>
            <div class="format-btn selected" data-fmt="html" onclick="toggleFormat(this)">
              <span class="fmt-icon">🌐</span>.html
            </div>
            <div class="format-btn selected" data-fmt="csv" onclick="toggleFormat(this)">
              <span class="fmt-icon">📊</span>.csv
            </div>
            <div class="format-btn" data-fmt="pdf" onclick="toggleFormat(this)">
              <span class="fmt-icon">📄</span>.pdf
            </div>
            <div class="format-btn" data-fmt="db" onclick="toggleFormat(this)">
              <span class="fmt-icon">💾</span>.db
            </div>
          </div>
        </div>

        <div class="field">
          <label>Output Directory</label>
          <input type="text" id="output_dir" value="./nessus_downloads">
        </div>

        <div class="row">
          <div class="field">
            <label>Parallel Workers</label>
            <select id="workers">
              <option value="1">1 (slow)</option>
              <option value="2">2</option>
              <option value="3" selected>3 (default)</option>
              <option value="5">5</option>
              <option value="10">10 (fast)</option>
            </select>
          </div>
          <div class="field">
            <label>Folder Filter</label>
            <select id="folder_id">
              <option value="">All folders</option>
            </select>
          </div>
        </div>

        <button class="btn btn-start" id="btn-start" onclick="startDownload()" disabled>
          ▶ Start Bulk Download
        </button>
      </div>
    </div>
  </div>

  <!-- RIGHT: Status + Scans -->
  <div class="right-col">

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Scans</div>
        <div class="stat-value cyan" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Selected</div>
        <div class="stat-value cyan" id="stat-selected">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Success</div>
        <div class="stat-value green" id="stat-success">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Failed</div>
        <div class="stat-value red" id="stat-failed">—</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="dot"></div>Scan List
        <span id="scan-count" style="margin-left:auto;color:var(--text3);font-size:11px;">Connect to load</span>
      </div>
      <div class="select-all-row" id="select-all-row" style="display:none">
        <span style="color:var(--text3);font-size:11px;">Select scans to download</span>
        <div>
          <button class="link-btn" onclick="selectAll()">Select all</button>
          &nbsp;·&nbsp;
          <button class="link-btn" onclick="deselectAll()">Deselect all</button>
        </div>
      </div>
      <div class="scan-list" id="scan-list">
        <div style="padding:40px;text-align:center;color:var(--text3);font-family:var(--sans);font-size:13px)">
          Connect to Nessus to see available scans
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="dot"></div>Live Log
        <span id="job-status-badge" style="margin-left:auto;font-size:10px;color:var(--text3);">IDLE</span>
      </div>
      <div class="panel-body" style="padding:0">
        <div class="job-bar" style="margin:0;border-radius:0;">
          <div class="job-bar-fill" id="job-bar-fill"></div>
        </div>
        <div class="log-container" id="log-container">
          <div class="log-empty">Waiting for job to start...</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
let authMode = 'apikey';
let allScans = [];
let selectedScanIds = new Set();
let activeJobId = null;
let pollInterval = null;
let connectedFolders = [];

function switchAuth(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('auth-apikey').style.display = mode === 'apikey' ? '' : 'none';
  document.getElementById('auth-password').style.display = mode === 'password' ? '' : 'none';
}

function toggleFormat(el) {
  el.classList.toggle('selected');
}

function getConfig() {
  const formats = [];
  document.querySelectorAll('.format-btn.selected').forEach(b => formats.push(b.dataset.fmt));

  const cfg = {
    host: document.getElementById('host').value.trim(),
    port: document.getElementById('port').value.trim() || '8834',
    formats,
    output_dir: document.getElementById('output_dir').value.trim() || './nessus_downloads',
    workers: document.getElementById('workers').value,
    folder_id: document.getElementById('folder_id').value || null,
  };

  if (authMode === 'apikey') {
    cfg.access_key = document.getElementById('access_key').value.trim();
    cfg.secret_key = document.getElementById('secret_key').value.trim();
  } else {
    cfg.username = document.getElementById('username').value.trim();
    cfg.password = document.getElementById('password').value;
  }

  if (selectedScanIds.size > 0) {
    cfg.scan_ids = [...selectedScanIds];
  }

  return cfg;
}

async function testConnection() {
  const cfg = getConfig();
  if (!cfg.host) { showStatus('Enter a host/IP', false); return; }

  const statusEl = document.getElementById('conn-status');
  statusEl.className = 'connection-status status-ok';
  statusEl.style.display = 'block';
  statusEl.textContent = '⟳ Connecting...';

  try {
    const res = await fetch('/api/test-connection', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(cfg)
    });
    const data = await res.json();

    if (data.ok) {
      statusEl.className = 'connection-status status-ok';
      statusEl.textContent = `✓ Connected — ${data.scan_count} scan(s) found`;
      document.getElementById('btn-start').disabled = false;

      allScans = data.scans || [];
      connectedFolders = data.folders || [];
      renderScans(allScans);
      renderFolders(connectedFolders);
      document.getElementById('stat-total').textContent = allScans.length;
      document.getElementById('stat-selected').textContent = allScans.filter(s =>
        ['completed','imported'].includes((s.status||'').toLowerCase())
      ).length;
    } else {
      statusEl.className = 'connection-status status-err';
      statusEl.textContent = `✗ ${data.error}`;
    }
  } catch (e) {
    statusEl.className = 'connection-status status-err';
    statusEl.textContent = `✗ Network error: ${e.message}`;
  }
}

function renderFolders(folders) {
  const sel = document.getElementById('folder_id');
  sel.innerHTML = '<option value="">All folders</option>';
  folders.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f.id;
    opt.textContent = f.name;
    sel.appendChild(opt);
  });
}

function renderScans(scans) {
  const el = document.getElementById('scan-list');
  document.getElementById('select-all-row').style.display = 'flex';
  document.getElementById('scan-count').textContent = `${scans.length} scans`;

  if (!scans.length) {
    el.innerHTML = '<div style="padding:30px;text-align:center;color:var(--text3)">No scans found</div>';
    return;
  }

  el.innerHTML = '';
  scans.forEach(scan => {
    const status = (scan.status || 'unknown').toLowerCase();
    const downloadable = ['completed','imported'].includes(status);
    const div = document.createElement('div');
    div.className = 'scan-item' + (downloadable ? ' selected' : '');
    div.dataset.id = scan.id;

    const statusClass = status === 'completed' ? 's-completed' :
                        status === 'running' ? 's-running' : 's-other';
    const ts = scan.last_modification_date ?
      new Date(scan.last_modification_date * 1000).toLocaleDateString() : '—';

    div.innerHTML = `
      <div class="scan-check">${downloadable ? '✓' : ''}</div>
      <div class="scan-info">
        <div class="scan-name">${scan.name || 'Unnamed'}</div>
        <div class="scan-meta">ID: ${scan.id} · Modified: ${ts}</div>
      </div>
      <span class="scan-status ${statusClass}">${status}</span>
    `;

    if (downloadable) {
      selectedScanIds.add(scan.id);
      div.onclick = () => toggleScan(div, scan.id);
    }

    el.appendChild(div);
  });

  updateSelectedCount();
}

function toggleScan(el, id) {
  if (selectedScanIds.has(id)) {
    selectedScanIds.delete(id);
    el.classList.remove('selected');
    el.querySelector('.scan-check').textContent = '';
  } else {
    selectedScanIds.add(id);
    el.classList.add('selected');
    el.querySelector('.scan-check').textContent = '✓';
  }
  updateSelectedCount();
}

function selectAll() {
  document.querySelectorAll('.scan-item').forEach(el => {
    const id = parseInt(el.dataset.id);
    const scan = allScans.find(s => s.id === id);
    if (scan && ['completed','imported'].includes((scan.status||'').toLowerCase())) {
      selectedScanIds.add(id);
      el.classList.add('selected');
      el.querySelector('.scan-check').textContent = '✓';
    }
  });
  updateSelectedCount();
}

function deselectAll() {
  selectedScanIds.clear();
  document.querySelectorAll('.scan-item').forEach(el => {
    el.classList.remove('selected');
    el.querySelector('.scan-check').textContent = '';
  });
  updateSelectedCount();
}

function updateSelectedCount() {
  document.getElementById('stat-selected').textContent = selectedScanIds.size;
}

async function startDownload() {
  if (selectedScanIds.size === 0) {
    alert('Please select at least one scan to download.');
    return;
  }
  const cfg = getConfig();
  if (cfg.formats.length === 0) {
    alert('Please select at least one format.');
    return;
  }

  document.getElementById('btn-start').disabled = true;
  document.getElementById('log-container').innerHTML = '';
  document.getElementById('stat-success').textContent = '0';
  document.getElementById('stat-failed').textContent = '0';
  document.getElementById('job-status-badge').textContent = 'RUNNING';
  document.getElementById('job-status-badge').style.color = 'var(--accent)';
  document.getElementById('job-bar-fill').classList.remove('done');
  document.getElementById('job-bar-fill').style.width = '5%';

  try {
    const res = await fetch('/api/start-download', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(cfg)
    });
    const data = await res.json();
    activeJobId = data.job_id;
    pollJob();
  } catch (e) {
    appendLog(`✗ Failed to start job: ${e.message}`, 'err');
    document.getElementById('btn-start').disabled = false;
  }
}

function pollJob() {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    if (!activeJobId) return;
    try {
      const res = await fetch(`/api/job/${activeJobId}`);
      const job = await res.json();
      renderLogs(job.logs || []);

      const total = selectedScanIds.size;
      const done = (job.results?.success?.length || 0) + (job.results?.failed?.length || 0);
      const pct = total > 0 ? Math.min(95, Math.round(done / total * 100)) : 5;
      document.getElementById('job-bar-fill').style.width = pct + '%';

      if (job.results) {
        document.getElementById('stat-success').textContent = job.results.success?.length || 0;
        document.getElementById('stat-failed').textContent = job.results.failed?.length || 0;
      }

      if (job.status === 'done' || job.status === 'error') {
        clearInterval(pollInterval);
        document.getElementById('job-bar-fill').classList.add('done');
        document.getElementById('job-status-badge').textContent = job.status === 'done' ? 'DONE' : 'ERROR';
        document.getElementById('job-status-badge').style.color = job.status === 'done' ? 'var(--green)' : 'var(--red)';
        document.getElementById('btn-start').disabled = false;
      }
    } catch (e) {}
  }, 1000);
}

let lastLogCount = 0;
function renderLogs(logs) {
  if (logs.length === lastLogCount) return;
  lastLogCount = logs.length;

  const container = document.getElementById('log-container');
  container.innerHTML = '';
  logs.forEach(line => {
    const div = document.createElement('div');
    div.className = 'log-line';
    if (line.includes('✓')) div.classList.add('ok');
    else if (line.includes('✗') || line.toLowerCase().includes('error') || line.toLowerCase().includes('fail')) div.classList.add('err');
    else if (line.includes('→') || line.includes('Connecting') || line.includes('Fetching')) div.classList.add('info');
    else if (line.includes('Skipping') || line.includes('timeout')) div.classList.add('warn');
    div.textContent = line;
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
}
</script>
